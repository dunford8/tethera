<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TETHERA • Mobile WebApp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 30% 20%, #132117, #020403);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .app {
            width: 100%;
            height: 100vh;
            background: transparent;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: #fff;
        }

        .screens-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .screen {
            display: none;
            flex: 1;
            flex-direction: column;
            padding: 20px 16px 10px 16px;
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .screen::-webkit-scrollbar {
            display: none;
        }

        .screen.active {
            display: flex;
        }

        .nav {
            display: flex;
            height: 70px;
            background: rgba(10, 20, 15, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-top: 1px solid rgba(0, 255, 170, 0.15);
            padding: 8px 0;
            flex-shrink: 0;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            font-size: 11px;
            font-weight: 500;
            color: #a0b8b0;
            letter-spacing: 0.3px;
            cursor: pointer;
            user-select: none;
        }

        .nav-item.active {
            color: #00ffaa;
            text-shadow: 0 0 8px rgba(0,255,170,0.5);
        }

        .nav-item span:first-child {
            font-size: 20px;
        }

        .title-main {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #fff;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(0,255,170,0.3);
        }

        .glass-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(0,255,170,0.2);
            border-radius: 24px;
            padding: 16px 20px;
            margin-bottom: 16px;
        }

        .card-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-label {
            font-size: 15px;
            font-weight: 400;
            color: #b0e0d0;
        }

        .card-value {
            font-size: 26px;
            font-weight: 600;
            color: #fff;
            text-shadow: 0 0 8px rgba(0,255,170,0.3);
        }

        .gradient-btn {
            background: linear-gradient(135deg, #00c9a7, #00a87e);
            border: none;
            border-radius: 40px;
            padding: 16px 24px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 18px;
            color: #0b1f18;
            box-shadow: 0 8px 20px rgba(0,255,170,0.3);
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .gradient-btn:active {
            transform: scale(0.98);
            box-shadow: 0 4px 12px rgba(0,255,170,0.4);
        }

        .timer-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 16px 0 24px;
        }

        .progress-ring {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: conic-gradient(#00ffaa 0deg 200deg, #2a4038 200deg 360deg);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 12px;
        }

        .progress-ring::before {
            content: '';
            position: absolute;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #0a1814;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.6);
        }

        .timer-value {
            position: relative;
            z-index: 2;
            font-size: 26px;
            font-weight: 700;
            color: #fff;
        }

        .timer-label {
            font-size: 14px;
            color: #a0c0b2;
        }

        .timer-sub {
            font-size: 16px;
            font-weight: 500;
            margin: 4px 0 2px;
        }

        .timer-hint {
            font-size: 13px;
            color: #6f8f82;
            background: rgba(0,255,170,0.1);
            padding: 6px 16px;
            border-radius: 30px;
        }

        .wallet-balance {
            font-size: 52px;
            font-weight: 700;
            text-align: center;
            margin: 20px 0 10px;
        }

        .wallet-actions {
            display: flex;
            gap: 12px;
            margin: 24px 0 32px;
        }

        .wallet-actions .gradient-btn {
            padding: 14px 0;
            font-size: 16px;
            background: linear-gradient(135deg, #1e4a3a, #0e2f24);
            color: white;
            box-shadow: none;
        }

        .network-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 16px;
        }

        .network-chip {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(0,255,170,0.2);
            border-radius: 40px;
            padding: 10px 20px;
            font-weight: 500;
            font-size: 14px;
            color: #ccfff0;
        }

        .rating-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 16px;
        }

        .rating-item {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(0,255,170,0.15);
            border-radius: 20px;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: 500;
        }

        .rating-amount {
            color: #00ffaa;
            font-weight: 600;
        }

        .ref-levels {
            margin-top: 20px;
        }

        .ref-card {
            background: rgba(255,255,255,0.02);
            border-left: 4px solid #00ffaa;
            border-radius: 16px;
            padding: 18px 20px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
        }

        .ref-percent {
            font-size: 22px;
            font-weight: 700;
            color: #00ffaa;
        }

        @media (max-height: 700px) {
            .screen {
                padding-top: 12px;
                padding-bottom: 5px;
            }
            .title-main {
                font-size: 24px;
                margin-bottom: 12px;
            }
            .glass-card {
                padding: 12px 16px;
                margin-bottom: 12px;
            }
            .timer-container {
                margin: 8px 0 16px;
            }
            .progress-ring {
                width: 120px;
                height: 120px;
            }
            .progress-ring::before {
                width: 100px;
                height: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="screens-container">
            <div class="screen home active" id="screen-home">
                <h1 class="title-main">TETHERA</h1>
                <div class="glass-card">
                    <div class="card-row">
                        <span class="card-label">Заработано с циклов</span>
                        <span class="card-value">$0.00</span>
                    </div>
                </div>
                <div class="glass-card">
                    <div class="card-row">
                        <span class="card-label">Активный депозит</span>
                        <span class="card-value">$0.00</span>
                    </div>
                </div>
                <div class="timer-container">
                    <div class="progress-ring"><span class="timer-value">6ч</span></div>
                    <span class="timer-label">Следующий цикл</span>
                    <span class="timer-sub">06:00:00</span>
                    <span class="timer-hint">+1.5% за цикл (6 часов)</span>
                </div>
                <button class="gradient-btn">Запустить цикл</button>
            </div>
            <div class="screen wallet" id="screen-wallet">
                <h1 class="title-main" style="font-size:24px;">КОШЕЛЁК</h1>
                <div class="wallet-balance">$0.00</div>
                <div class="wallet-actions">
                    <button class="gradient-btn">Пополнить</button>
                    <button class="gradient-btn">Вывести</button>
                </div>
                <h2 style="margin-top:20px;">Поддерживаемые сети</h2>
                <div class="network-list">
                    <span class="network-chip">TON</span>
                    <span class="network-chip">TRC20</span>
                    <span class="network-chip">ERC20</span>
                    <span class="network-chip">BEP20</span>
                    <span class="network-chip">SOL</span>
                </div>
            </div>
            <div class="screen rating" id="screen-rating">
                <h1 class="title-main" style="font-size:24px;">РЕЙТИНГ</h1>
                <div class="rating-list">
                    <div class="rating-item"><span class="rating-name">User1</span><span class="rating-amount">$1000</span></div>
                    <div class="rating-item"><span class="rating-name">User2</span><span class="rating-amount">$800</span></div>
                    <div class="rating-item"><span class="rating-name">User3</span><span class="rating-amount">$500</span></div>
                </div>
            </div>
            <div class="screen ref" id="screen-ref">
                <h1 class="title-main" style="font-size:24px;">РЕФЕРАЛЫ</h1>
                <div class="ref-levels">
                    <div class="ref-card"><span class="ref-level">Уровень 1</span><span class="ref-percent">10%</span></div>
                    <div class="ref-card"><span class="ref-level">Уровень 2</span><span class="ref-percent">5%</span></div>
                    <div class="ref-card"><span class="ref-level">Уровень 3</span><span class="ref-percent">5%</span></div>
                </div>
            </div>
        </div>
        <nav class="nav">
            <div class="nav-item active" data-screen="home"><span>🏠</span><span>Главная</span></div>
            <div class="nav-item" data-screen="wallet"><span>💳</span><span>Кошелёк</span></div>
            <div class="nav-item" data-screen="rating"><span>🏆</span><span>Рейтинг</span></div>
            <div class="nav-item" data-screen="ref"><span>👥</span><span>Рефералы</span></div>
        </nav>
    </div>
    <script>
        (function() {
            const screens = document.querySelectorAll('.screen');
            const navItems = document.querySelectorAll('.nav-item');

            function showScreen(screenId) {
                screens.forEach(s => s.classList.remove('active'));
                document.getElementById(`screen-${screenId}`).classList.add('active');
                navItems.forEach(item => {
                    item.classList.toggle('active', item.dataset.screen === screenId);
                });
            }

            navItems.forEach(item => {
                item.addEventListener('click', () => showScreen(item.dataset.screen));
            });
        })();
    </script>
</body>
</html>
